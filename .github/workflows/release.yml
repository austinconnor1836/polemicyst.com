name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type or explicit version (e.g. patch, minor, major, 1.2.3)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      custom_version:
        description: "Explicit version override (leave blank to use bump type above)"
        required: false
        type: string
      dry_run:
        description: "Dry run — print what would happen without creating the PR"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    name: Bump version & open release PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine version to use
        id: version_input
        run: |
          if [ -n "${{ inputs.custom_version }}" ]; then
            echo "bump=${{ inputs.custom_version }}" >> $GITHUB_OUTPUT
          else
            echo "bump=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Read current version
        id: current
        run: |
          CURRENT=$(node -p "require('./version.json').version")
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Bump version.json
        id: bump
        run: |
          NEW_VERSION=$(node scripts/bump-version.mjs "${{ steps.version_input.outputs.bump }}")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "### Version bump" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.current.outputs.version }} → $NEW_VERSION" >> $GITHUB_STEP_SUMMARY

      - name: Generate changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREVIOUS_TAG}..HEAD"
          fi

          {
            echo "## Release v${{ steps.bump.outputs.version }}"
            echo ""
            echo "**Previous version:** ${{ steps.current.outputs.version }}"
            echo ""

            FEATURES=$(git log $RANGE --pretty=format:'%s' --no-merges \
              | grep -iE '^feat' | sed 's/^/- /' || true)
            FIXES=$(git log $RANGE --pretty=format:'%s' --no-merges \
              | grep -iE '^fix' | sed 's/^/- /' || true)
            CHORES=$(git log $RANGE --pretty=format:'%s' --no-merges \
              | grep -iE '^(chore|ci|docs|refactor|style|perf|build)' \
              | sed 's/^/- /' || true)
            OTHER=$(git log $RANGE --pretty=format:'%s' --no-merges \
              | grep -viE '^(feat|fix|chore|ci|docs|refactor|style|perf|build|Merge)' \
              | sed 's/^/- /' || true)

            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES"
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            if [ -n "$CHORES" ]; then
              echo "### Maintenance"
              echo "$CHORES"
              echo ""
            fi

            if [ -n "$OTHER" ]; then
              echo "### Other"
              echo "$OTHER"
              echo ""
            fi

            echo "---"
            echo "_Release prepared by the [Prepare Release](../actions/workflows/release.yml) workflow._"
          } > /tmp/release-body.md

      - name: Dry run summary
        if: inputs.dry_run
        run: |
          echo "### Dry run — no changes made" >> $GITHUB_STEP_SUMMARY
          echo "Would bump **${{ steps.current.outputs.version }}** → **v${{ steps.bump.outputs.version }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Generated PR body" >> $GITHUB_STEP_SUMMARY
          cat /tmp/release-body.md >> $GITHUB_STEP_SUMMARY
          git checkout -- version.json

      - name: Create version bump branch and PR
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="release/v${{ steps.bump.outputs.version }}"

          # Delete stale release branch if it exists from a previous failed run
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add version.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push origin "$BRANCH"

          # Create PR to develop for the version bump
          BUMP_PR_URL=$(gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore: bump version to ${{ steps.bump.outputs.version }}" \
            --body "Automated version bump for release v${{ steps.bump.outputs.version }}. Auto-merge will merge this once CI passes, then the release PR will be created.")
          echo "### Version bump PR created" >> $GITHUB_STEP_SUMMARY
          echo "$BUMP_PR_URL" >> $GITHUB_STEP_SUMMARY

          # Save release body for the next step
          cp /tmp/release-body.md /tmp/release-body-saved.md

      - name: Create or update release PR
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_BRANCH="release-pr/v${{ steps.bump.outputs.version }}"

          # Clean up stale release-pr branch if it exists
          git push origin --delete "$RELEASE_BRANCH" 2>/dev/null || true

          # Create a temporary branch from the release branch (which has
          # the version bump commit). Using develop directly as PR head
          # causes GitHub's auto-delete head branches to delete develop on merge.
          BUMP_BRANCH="release/v${{ steps.bump.outputs.version }}"
          git checkout "$BUMP_BRANCH"
          git checkout -b "$RELEASE_BRANCH"
          git push origin "$RELEASE_BRANCH"

          # Close any existing release PRs from previous runs
          EXISTING=$(gh pr list --base main --state open \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("release-pr/")) | .number' \
            | head -1 || true)
          if [ -n "$EXISTING" ]; then
            echo "Closing stale release PR #$EXISTING"
            gh pr close "$EXISTING" --delete-branch || true
          fi

          PR_URL=$(gh pr create \
            --base main \
            --head "$RELEASE_BRANCH" \
            --title "Release v${{ steps.bump.outputs.version }}" \
            --body-file /tmp/release-body.md)
          echo "### Release PR created" >> $GITHUB_STEP_SUMMARY
          echo "$PR_URL" >> $GITHUB_STEP_SUMMARY
