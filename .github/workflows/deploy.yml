name: Deploy to AWS

on:
  push:
    branches:
      - main
      - develop

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_WEB: polemicyst-web
  ECR_REPOSITORY_LLM: polemicyst-llm-worker
  ECR_REPOSITORY_CLIP: polemicyst-clip-worker
  ECS_CLUSTER: polemicyst-cluster
  ECS_SERVICE_WEB: polemicyst-web
  ECS_SERVICE_PROVOCATIVENESS: provocativeness-scorer
  ECS_SERVICE_COMEDIC: comedic-scorer
  ECS_SERVICE_CLIP: clip-worker

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Temporarily skip Docker builds - use existing images from ECR
      # Will re-enable after migrations are complete

      - name: Update ECS Services
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE_WEB --force-new-deployment
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE_CLIP --force-new-deployment
