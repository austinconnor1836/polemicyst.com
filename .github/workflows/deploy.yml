name: Deploy to AWS

on:
  push:
    branches:
      - main
      - develop

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_WEB: polemicyst-web
  ECR_REPOSITORY_LLM: polemicyst-llm-worker
  ECR_REPOSITORY_CLIP: polemicyst-clip-worker
  ECS_CLUSTER: polemicyst-cluster

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Environment
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "github_environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "github_environment=development" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Web image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.env.outputs.environment }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG

      - name: Build and push Clip Worker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.env.outputs.environment }}
        run: |
          docker build -f workers/clip-worker/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY_CLIP:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_CLIP:$IMAGE_TAG

      - name: Build and push LLM Worker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.env.outputs.environment }}
        run: |
          docker build -f workers/llm-worker/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY_LLM:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_LLM:$IMAGE_TAG

      - name: Update ECS Services
        env:
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          # Update web service
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service polemicyst-${ENVIRONMENT}-web \
            --force-new-deployment

          # Update clip worker service
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service ${ENVIRONMENT}-clip-worker \
            --force-new-deployment
