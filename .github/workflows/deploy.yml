name: Deploy to AWS

on:
  push:
    branches:
      - main
      - develop

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_WEB: polemicyst-web
  ECR_REPOSITORY_LLM: polemicyst-llm-worker
  ECR_REPOSITORY_CLIP: polemicyst-clip-worker
  ECS_CLUSTER: polemicyst-cluster

jobs:
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Environment
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Web image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.env.outputs.environment }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG

      - name: Update Web ECS Service
        env:
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service polemicyst-${ENVIRONMENT}-web \
            --force-new-deployment

  deploy-clip-worker:
    name: Deploy Clip Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Environment
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Clip Metadata Worker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.env.outputs.environment }}
        run: |
          docker build -f workers/clip-metadata-worker/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY_CLIP:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_CLIP:$IMAGE_TAG

      - name: Update Clip Worker ECS Service
        env:
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service ${ENVIRONMENT}-clip-worker \
            --force-new-deployment

  deploy-llm-worker:
    name: Deploy LLM Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Environment
        id: env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push LLM Worker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.env.outputs.environment }}
        run: |
          docker build -f workers/llm-worker/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY_LLM:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_LLM:$IMAGE_TAG

  android-test:
    name: Android Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        working-directory: android
        run: ./gradlew testDevDebugUnitTest

  build-android-dev:
    name: Build Android Dev APK
    runs-on: ubuntu-latest
    needs: android-test
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build dev debug APK
        working-directory: android
        run: ./gradlew assembleDevDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-debug-apk
          path: android/app/build/outputs/apk/dev/debug/*.apk

      - name: Upload to Firebase App Distribution
        if: ${{ env.FIREBASE_APP_ID_DEV != '' }}
        env:
          FIREBASE_APP_ID_DEV: ${{ secrets.FIREBASE_APP_ID_DEV }}
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_DEV }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: android/app/build/outputs/apk/dev/debug/app-dev-debug.apk

  build-android-release:
    name: Build Android Production Release
    runs-on: ubuntu-latest
    needs: android-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks

      - name: Build production release AAB
        working-directory: android
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          KEYSTORE_PATH: upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleProdRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-release-aab
          path: android/app/build/outputs/bundle/prodRelease/*.aab

      - name: Upload to Play Store
        if: ${{ env.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.polemicyst.android
          releaseFiles: android/app/build/outputs/bundle/prodRelease/*.aab
          track: internal

  ios-test:
    name: iOS Tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create xcconfig files
        working-directory: ios
        run: |
          mkdir -p xcconfig
          cat > xcconfig/Debug.xcconfig << 'XCEOF'
          GOOGLE_CLIENT_ID = placeholder
          GOOGLE_CLIENT_ID_REVERSED = placeholder
          GOOGLE_SERVER_CLIENT_ID = placeholder
          XCEOF
          cat > xcconfig/Release.xcconfig << 'XCEOF'
          GOOGLE_CLIENT_ID = ${GOOGLE_IOS_CLIENT_ID}
          GOOGLE_CLIENT_ID_REVERSED = ${GOOGLE_IOS_CLIENT_ID_REVERSED}
          GOOGLE_SERVER_CLIENT_ID = ${GOOGLE_SERVER_CLIENT_ID}
          XCEOF

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Run tests
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild test \
            -project Clipfire.xcodeproj \
            -scheme ClipfireApp \
            -skip-testing:ClipfireUITests \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            | xcpretty --color

  build-ios-dev:
    name: Build iOS Dev (TestFlight)
    runs-on: macos-15
    needs: ios-test
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create xcconfig files
        working-directory: ios
        env:
          GOOGLE_IOS_CLIENT_ID: ${{ secrets.GOOGLE_IOS_CLIENT_ID }}
          GOOGLE_IOS_CLIENT_ID_REVERSED: ${{ secrets.GOOGLE_IOS_CLIENT_ID_REVERSED }}
          GOOGLE_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_SERVER_CLIENT_ID }}
        run: |
          mkdir -p xcconfig
          cat > xcconfig/Debug.xcconfig << XCEOF
          GOOGLE_CLIENT_ID = ${GOOGLE_IOS_CLIENT_ID:-placeholder}
          GOOGLE_CLIENT_ID_REVERSED = ${GOOGLE_IOS_CLIENT_ID_REVERSED:-placeholder}
          GOOGLE_SERVER_CLIENT_ID = ${GOOGLE_SERVER_CLIENT_ID:-placeholder}
          XCEOF
          cp xcconfig/Debug.xcconfig xcconfig/Release.xcconfig

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Decode signing certificate
        if: ${{ env.APPLE_CERTIFICATE_BASE64 != '' }}
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        working-directory: ios
        run: echo "$APPLE_CERTIFICATE_BASE64" | base64 -d > fastlane/cert.p12

      - name: Decode provisioning profile
        if: ${{ env.APPLE_PROVISIONING_PROFILE_BASE64 != '' }}
        env:
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        working-directory: ios
        run: echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 -d > fastlane/profile.mobileprovision

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: ios

      - name: Build and upload to TestFlight
        if: ${{ env.ASC_KEY_CONTENT != '' }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
        working-directory: ios
        run: bundle exec fastlane beta

  build-ios-release:
    name: Build iOS Production Release
    runs-on: macos-15
    needs: ios-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create xcconfig files
        working-directory: ios
        env:
          GOOGLE_IOS_CLIENT_ID: ${{ secrets.GOOGLE_IOS_CLIENT_ID }}
          GOOGLE_IOS_CLIENT_ID_REVERSED: ${{ secrets.GOOGLE_IOS_CLIENT_ID_REVERSED }}
          GOOGLE_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_SERVER_CLIENT_ID }}
        run: |
          mkdir -p xcconfig
          cat > xcconfig/Debug.xcconfig << XCEOF
          GOOGLE_CLIENT_ID = ${GOOGLE_IOS_CLIENT_ID:-placeholder}
          GOOGLE_CLIENT_ID_REVERSED = ${GOOGLE_IOS_CLIENT_ID_REVERSED:-placeholder}
          GOOGLE_SERVER_CLIENT_ID = ${GOOGLE_SERVER_CLIENT_ID:-placeholder}
          XCEOF
          cp xcconfig/Debug.xcconfig xcconfig/Release.xcconfig

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Decode signing certificate
        if: ${{ env.APPLE_CERTIFICATE_BASE64 != '' }}
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
        working-directory: ios
        run: echo "$APPLE_CERTIFICATE_BASE64" | base64 -d > fastlane/cert.p12

      - name: Decode provisioning profile
        if: ${{ env.APPLE_PROVISIONING_PROFILE_BASE64 != '' }}
        env:
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        working-directory: ios
        run: echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 -d > fastlane/profile.mobileprovision

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: ios

      - name: Build and upload to App Store Connect
        if: ${{ env.ASC_KEY_CONTENT != '' }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
        working-directory: ios
        run: bundle exec fastlane release
