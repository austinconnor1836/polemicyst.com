name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'shared/**'
              - 'workers/**'
              - 'prisma/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'tsconfig.docker.json'
              - 'next.config.js'
              - 'tailwind.config.ts'
              - 'postcss.config.js'
              - '.eslintrc.json'
              - '.prettierrc'
              - 'auth.ts'

  lint-and-build:
    name: Lint & Build
    needs: changes
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  lint-and-build-skip:
    name: Lint & Build
    needs: changes
    if: needs.changes.outputs.should_build != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No app code changed — skipping build"
