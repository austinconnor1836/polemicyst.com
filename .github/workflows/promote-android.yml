name: Promote Android Release

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Target track'
        required: true
        type: choice
        options:
          - beta
          - production
        default: beta
      rollout_fraction:
        description: 'Staged rollout fraction (0.0 to 1.0, production only)'
        required: false
        type: string
        default: '1.0'

jobs:
  promote:
    name: Promote to ${{ inputs.track }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks

      - name: Build production release AAB
        working-directory: android
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          KEYSTORE_PATH: upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleProdRelease

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.polemicyst.android
          releaseFiles: android/app/build/outputs/bundle/prodRelease/*.aab
          track: ${{ inputs.track }}
          status: ${{ inputs.track == 'production' && inputs.rollout_fraction != '1.0' && 'inProgress' || 'completed' }}
          userFraction: ${{ inputs.track == 'production' && inputs.rollout_fraction != '1.0' && inputs.rollout_fraction || '' }}
