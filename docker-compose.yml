version: '3.9'
services:
  db:
    image: postgres:15
    container_name: clips-genie-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: clips-genie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - app-network

  # Redis for job queuing
  redis:
    image: redis:alpine
    ports:
      - '6379:6379'
    restart: unless-stopped
    networks:
      - app-network

  clip-worker:
    build:
      context: .
      dockerfile: ./workers/clip-worker/Dockerfile
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/clips-genie
      - OLLAMA_BASE_URL=http://ollama:11434
      - NODE_ENV=production
    depends_on:
      - redis
      - db
      - ollama
    command: ['node', 'index.js']
    restart: unless-stopped
    networks:
      - app-network

  clip-metadata-worker:
    build:
      context: .
      dockerfile: ./workers/clip-metadata-worker/Dockerfile
    command: ['npx', 'tsx', 'index.ts']
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/clips-genie
      - OLLAMA_BASE_URL=http://ollama:11434
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      - redis
      - db
    restart: unless-stopped
    networks:
      - app-network

  transcription-worker:
    build:
      context: .
      dockerfile: ./workers/transcription-worker/Dockerfile
    command: ['npx', 'ts-node', '-r', 'tsconfig-paths/register', 'index.ts']
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/clips-genie
      - NODE_ENV=production
    depends_on:
      - redis
      - db
    restart: unless-stopped
    networks:
      - app-network

  # Faster Whisper for transcription
  faster-whisper:
    image: lscr.io/linuxserver/faster-whisper:latest
    container_name: faster-whisper
    environment:
      - TZ=Etc/UTC
      - WHISPER_MODEL=tiny-int8
      - WHISPER_LANG=en
    volumes:
      - ./faster-whisper-data:/config
    ports:
      - '10300:10300'
    restart: unless-stopped
    networks:
      - app-network

  # Ollama for language model processing
  ollama:
    build:
      context: .
      dockerfile: ./workers/ollama-worker/Dockerfile
    container_name: ollama
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: ['/bin/bash', '/app/scripts/start-ollama.sh']
    ports:
      - '11434:11434'
    restart: unless-stopped
    networks:
      - app-network

  poller:
    build:
      context: .
      dockerfile: ./workers/poller-worker/Dockerfile
    volumes:
      - ./shared:/app/shared # ⬅️ needed for prisma and shared code
      - ./prisma:/app/prisma
    depends_on:
      - db
      - redis
    environment:
      - NODE_ENV=production
      # IMPORTANT: the poller runs inside Docker, so it must use Docker service DNS
      # (not localhost, which would point at the container itself).
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/clips-genie
      - REDIS_HOST=redis
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - app-network

  download-worker:
    build:
      context: .
      dockerfile: ./workers/video-download-worker/Dockerfile
    command: ['npx', 'ts-node', 'index.ts']
    volumes:
      - ./shared:/app/shared
      - ./prisma:/app/prisma
    depends_on:
      - db
      - redis
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/clips-genie
      - REDIS_HOST=redis
    env_file:
      - .env
      - .env.local
    restart: unless-stopped
    networks:
      - app-network

volumes:
  ollama-data:
  faster-whisper-data:
  pg-data:

networks:
  app-network:
