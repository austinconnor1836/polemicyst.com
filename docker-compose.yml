version: '3.9'
services:
  db:
    image: postgres:15
    container_name: clips-genie-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: clips-genie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - app-network

  # Redis for job queuing
  redis:
    image: redis:alpine
    ports:
      - '6379:6379'
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/clips-genie
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - app-network

  # Clip Worker - Main job processing (Node.js)
  clip-worker:
    build:
      context: .
      dockerfile: ./clip-worker/Dockerfile
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/clips-genie
      - OLLAMA_BASE_URL=http://ollama:11434
      - NODE_ENV=production
    depends_on:
      - redis
      - db
      - ollama
    command: ['node', 'index.js']
    restart: unless-stopped
    networks:
      - app-network

  # Hot-reload clip worker (dev-only)
  clip-worker-dev:
    image: node:18
    working_dir: /app
    command: ["sh", "-c", "apt-get update && apt-get install -y ffmpeg && cd /app && npm install && npx tsx watch clip-worker/index.ts"]
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/clips-genie
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
      - OLLAMA_OPTIONS={"num_predict":256,"temperature":0.2}
    env_file:
      - .env
      - .env.local
    depends_on:
      - redis
      - db
      - ollama
    networks:
      - app-network

  clip-metadata-worker:
    build:
      context: .
      dockerfile: ./clip-worker/Dockerfile
    command: ['node', 'generate/generateMetadataWorker.js']
    environment:
      - REDIS_HOST=redis
      - NODE_ENV=production
    depends_on:
      - redis
      - db
    restart: unless-stopped
    networks:
      - app-network

  # Faster Whisper for transcription
  faster-whisper:
    image: lscr.io/linuxserver/faster-whisper:latest
    container_name: faster-whisper
    environment:
      - TZ=Etc/UTC
      - WHISPER_MODEL=tiny-int8
      - WHISPER_LANG=en
    volumes:
      - ./faster-whisper-data:/config
    ports:
      - '10300:10300'
    restart: unless-stopped
    networks:
      - app-network

  # Ollama for language model processing
  ollama:
    build:
      context: ./backend
      dockerfile: ollama.Dockerfile
    container_name: ollama
    volumes:
      - ./backend/scripts/start-ollama.sh:/start.sh
      - ollama-data:/root/.ollama
    entrypoint: ['/bin/bash', '/start.sh']
    ports:
      - '11434:11434'
    restart: unless-stopped
    networks:
      - app-network

  poller:
    build:
      context: .
      dockerfile: ./workers/workers.Dockerfile
    volumes:
      - ./shared:/app/shared # ⬅️ needed for prisma and shared code
      - ./prisma:/app/prisma
    depends_on:
      - backend
      - db
      - redis
    environment:
      - NODE_ENV=production
      # IMPORTANT: the poller runs inside Docker, so it must use Docker service DNS
      # (not localhost, which would point at the container itself).
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/clips-genie
      - REDIS_HOST=redis
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - app-network

  download-worker:
    build:
      context: .
      dockerfile: ./workers/workers.Dockerfile
    command: ['npx', 'ts-node', 'downloadWorker.ts']
    volumes:
      - ./shared:/app/shared
      - ./prisma:/app/prisma
    depends_on:
      - db
      - redis
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/clips-genie
      - REDIS_HOST=redis
    env_file:
      - .env
      - .env.local
    restart: unless-stopped
    networks:
      - app-network

volumes:
  ollama-data:
  faster-whisper-data:
  pg-data:

networks:
  app-network:
