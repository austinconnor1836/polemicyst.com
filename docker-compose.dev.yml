services:


  clip-worker:
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - BACKEND_BASE_URL=http://backend:3001
    volumes:
      - ./backend/workers/clip-worker:/app
      - ./shared:/app/shared
      - ./prisma:/app/prisma
      # keep container-installed deps even when bind-mounting source
      - clip-worker-node-modules:/app/node_modules
    command: ['npm', 'run', 'dev']

volumes:

  clip-worker-node-modules:
