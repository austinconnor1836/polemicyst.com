name: Clipfire
options:
  bundleIdPrefix: com.clipfire
  deploymentTarget:
    iOS: '17.0'
  xcodeVersion: '16.0'
  generateEmptyDirectories: false
  groupSortPosition: top

configFiles:
  Debug: xcconfig/Debug.xcconfig
  Release: xcconfig/Release.xcconfig

settings:
  base:
    SWIFT_VERSION: '5.9'
    IPHONEOS_DEPLOYMENT_TARGET: '17.0'

packages:
  GoogleSignIn-iOS:
    url: https://github.com/google/GoogleSignIn-iOS
    from: '8.0.0'

targets:
  ClipfireiOS:
    type: framework
    platform: iOS
    sources:
      - path: Sources/ClipfireiOS
    dependencies:
      - package: GoogleSignIn-iOS
        product: GoogleSignIn
      - package: GoogleSignIn-iOS
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clipfire.ios
        GENERATE_INFOPLIST_FILE: true

  ClipfireApp:
    type: application
    platform: iOS
    sources:
      - path: Sources/ClipfireApp
      - path: Supporting/Assets.xcassets
    dependencies:
      - target: ClipfireiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clipfire.app
        PRODUCT_NAME: Clipfire
        MARKETING_VERSION: '1.0.0'
        CURRENT_PROJECT_VERSION: '1'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Supporting/Clipfire.entitlements
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: 'UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight'
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: 'UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight'
        API_BASE_URL: 'https://polemicyst.com'
      configs:
        Debug:
          API_BASE_URL: 'https://localhost:3000'
          CODE_SIGN_STYLE: Automatic
        Release:
          API_BASE_URL: 'https://polemicyst.com'
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: 'Apple Distribution'
          DEVELOPMENT_TEAM: '$(DEVELOPMENT_TEAM)'
    info:
      path: Supporting/Info.plist
      properties:
        CFBundleDisplayName: Clipfire
        API_BASE_URL: '$(API_BASE_URL)'
        GIDClientID: '$(GOOGLE_CLIENT_ID)'
        GOOGLE_SERVER_CLIENT_ID: '$(GOOGLE_SERVER_CLIENT_ID)'
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - '$(GOOGLE_CLIENT_ID_REVERSED)'
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    scheme:
      testTargets:
        - ClipfireiOSTests
      gatherCoverageData: true

  ClipfireiOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: ClipfireiOS
      - target: ClipfireApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clipfire.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: '$(BUILT_PRODUCTS_DIR)/Clipfire.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Clipfire'
        BUNDLE_LOADER: '$(TEST_HOST)'
