name: Polemicyst
options:
  bundleIdPrefix: com.polemicyst
  deploymentTarget:
    iOS: '17.0'
  xcodeVersion: '16.0'
  generateEmptyDirectories: false
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: '5.9'
    IPHONEOS_DEPLOYMENT_TARGET: '17.0'

packages:
  GoogleSignIn-iOS:
    url: https://github.com/google/GoogleSignIn-iOS
    from: '8.0.0'

targets:
  PolemicystiOS:
    type: framework
    platform: iOS
    sources:
      - path: Sources/PolemicystiOS
    dependencies:
      - package: GoogleSignIn-iOS
        product: GoogleSignIn
      - package: GoogleSignIn-iOS
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.polemicyst.ios
        GENERATE_INFOPLIST_FILE: true

  PolemicystApp:
    type: application
    platform: iOS
    sources:
      - path: Sources/PolemicystApp
      - path: Supporting/Assets.xcassets
    dependencies:
      - target: PolemicystiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.polemicyst.app
        PRODUCT_NAME: Polemicyst
        MARKETING_VERSION: '1.0.0'
        CURRENT_PROJECT_VERSION: '1'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Supporting/Polemicyst.entitlements
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: 'UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight'
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: 'UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight'
        API_BASE_URL: 'https://polemicyst.com'
        GOOGLE_CLIENT_ID: '$(GOOGLE_CLIENT_ID)'
      configs:
        Debug:
          API_BASE_URL: 'http://127.0.0.1:3000'
          CODE_SIGN_STYLE: Automatic
          GOOGLE_CLIENT_ID: '$(GOOGLE_CLIENT_ID)'
        Release:
          API_BASE_URL: 'https://polemicyst.com'
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: 'Apple Distribution'
          DEVELOPMENT_TEAM: '$(DEVELOPMENT_TEAM)'
          GOOGLE_CLIENT_ID: '$(GOOGLE_CLIENT_ID)'
    info:
      path: Supporting/Info.plist
      properties:
        API_BASE_URL: '$(API_BASE_URL)'
        GIDClientID: '$(GOOGLE_CLIENT_ID)'
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - '$(GOOGLE_CLIENT_ID_REVERSED)'
    scheme:
      testTargets:
        - PolemicystiOSTests
      gatherCoverageData: true

  PolemicystiOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: PolemicystiOS
      - target: PolemicystApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.polemicyst.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: '$(BUILT_PRODUCTS_DIR)/Polemicyst.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Polemicyst'
        BUNDLE_LOADER: '$(TEST_HOST)'
